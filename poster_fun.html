<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    padding: 0;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
#poster {
    width: 800px;
    height: 800px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    position: relative;
    padding: 40px;
    box-sizing: border-box;
}
.title {
    color: #fff;
    font-size: 52px;
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
}
.subtitle {
    color: #e74c3c;
    font-size: 28px;
    text-align: center;
    margin-top: 15px;
    font-weight: bold;
}
.tagline {
    color: #aaa;
    font-size: 16px;
    text-align: center;
    margin-top: 15px;
}
.slogan {
    color: #f39c12;
    font-size: 18px;
    text-align: center;
    margin-top: 25px;
    font-style: italic;
}
.flow {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 50px;
    gap: 10px;
}
.flow-box {
    padding: 12px 24px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    font-size: 16px;
}
.arrow {
    color: #666;
    font-size: 20px;
}
.members {
    margin-top: 50px;
    text-align: center;
}
.members-title {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 30px;
}
.member-row {
    display: flex;
    justify-content: center;
    gap: 40px;
}
.member {
    text-align: center;
}
.member-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 24px;
    margin: 0 auto 10px;
    border: 3px solid white;
}
.member-role {
    color: #bbb;
    font-size: 14px;
}
.insights {
    margin-top: 50px;
    text-align: center;
}
.insights-title {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
}
.insight-item {
    color: #999;
    font-size: 16px;
    margin: 10px 0;
}
.install {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: #0d1117;
    border: 2px solid #2ecc71;
    color: #2ecc71;
    padding: 12px 30px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 16px;
}
</style>
</head>
<body>
<div id="poster">
    <div class="title">伐木累分析大师</div>
    <div class="subtitle">相亲相爱一家人</div>
    <div class="slogan">「表面和谐，暗流涌动」</div>
    
    <div class="flow">
        <div class="flow-box" style="background: #e74c3c;">导入</div>
        <div class="arrow">→</div>
        <div class="flow-box" style="background: #f39c12;">解析</div>
        <div class="arrow">→</div>
        <div class="flow-box" style="background: #9b59b6;">AI分析</div>
        <div class="arrow">→</div>
        <div class="flow-box" style="background: #3498db;">洞察</div>
    </div>
    
    <div class="members">
        <div class="members-title">群聊成员画像</div>
        <div class="member-row">
            <div class="member">
                <div class="member-circle" style="background: #e74c3c;">妈</div>
                <div class="member-role">早安打卡机</div>
            </div>
            <div class="member">
                <div class="member-circle" style="background: #f39c12;">爸</div>
                <div class="member-role">转发轰炸机</div>
            </div>
            <div class="member">
                <div class="member-circle" style="background: #9b59b6;">我</div>
                <div class="member-role">已读不回</div>
            </div>
            <div class="member">
                <div class="member-circle" style="background: #3498db;">三姨</div>
                <div class="member-role">养生专家</div>
            </div>
        </div>
    </div>
    
    <div class="insights">
        <div class="insights-title">核心洞察</div>
        <div class="insight-item">发现谁才是真正的群主</div>
        <div class="insight-item">识别「收到」背后的情绪</div>
        <div class="insight-item">提取家族黑话和暗号</div>
    </div>
    
    <div class="install">clawhub install family-analyzer</div>
</div>
</body>
</html>
