name: Publish to Multiple Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 发布到 PyPI
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*

  # 发布到 npm
  publish-npm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci || npm install
    
    - name: Publish to npm
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npm publish --access public || true

  # 创建 GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-npm]
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## 伐木累分析大师 ${{ github.ref }}
          
          ### 安装方式
          
          **PyPI:**
          ```bash
          pip install family-analyzer
          ```
          
          **npm:**
          ```bash
          npm install -g family-analyzer
          ```
          
          **ClawHub:**
          ```
          clawhub install family-analyzer
          ```
          
          ### 使用
          ```bash
          family-analyzer /path/to/chat.json
          ```
        draft: false
        prerelease: false
